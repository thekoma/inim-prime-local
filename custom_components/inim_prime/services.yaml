get_event_log:
  fields:
    entity_id:
      required: true
      selector:
        entity:
          integration: inim_prime
    limit:
      default: 100
      selector:
        number:
          min: 0
          max: 4000
          mode: box

arm_forced:
  fields:
    entity_id:
      required: true
      selector:
        entity:
          integration: inim_prime
          domain:
            - alarm_control_panel
    scenario:
      example: "Ins.Notte"
      selector:
        text:
    mode:
      selector:
        select:
          translation_key: forced_arm_mode
          options:
            - away
            - home
            - night
    allow_partial:
      default: false
      selector:
        boolean:
